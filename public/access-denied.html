<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Доступ заборонено</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    h1 {
      color: #ff4757;
      margin-bottom: 20px;
      font-size: 32px;
    }

    p {
      color: #666;
      margin-bottom: 30px;
      font-size: 18px;
      line-height: 1.5;
    }

    .icon {
      font-size: 80px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="icon">🚫</div>
    <h1>Доступ заборонено</h1>
    <p>Ви не маєте доступу до цієї сторінки. Будь ласка, зверніться до адміністратора.</p>
  </div>
</body>

</html>
