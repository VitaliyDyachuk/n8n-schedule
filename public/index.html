<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Нагадування</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      color: #333;
      margin-bottom: 30px;
      text-align: center;
    }

    .form {
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: #555;
      font-weight: 500;
    }

    input[type="time"],
    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .reminders {
      margin-top: 30px;
    }

    .reminder-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .reminder-time {
      font-weight: 600;
      color: #333;
    }

    .reminder-message {
      color: #666;
      margin-left: 10px;
    }

    .delete-btn {
      background: #ff4757;
      padding: 8px 16px;
      font-size: 14px;
    }

    .delete-btn:hover {
      background: #ff3838;
    }

    .empty {
      text-align: center;
      color: #999;
      padding: 30px;
    }

    .days-selector {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .days-selector label {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      font-weight: normal;
    }

    .days-selector input[type="checkbox"] {
      width: auto;
    }

    .interval-group {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .interval-group input[type="number"] {
      width: 80px;
    }

    .interval-group select {
      flex: 1;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
    }

    .interval-group select:focus {
      outline: none;
      border-color: #667eea;
    }

    .date-group {
      display: flex;
      gap: 10px;
    }

    .date-group input[type="date"] {
      flex: 1;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
    }

    .date-group input[type="date"]:focus {
      outline: none;
      border-color: #667eea;
    }

    .times-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .time-input-group {
      display: flex;
      gap: 10px;
    }

    .time-input-group input[type="time"] {
      flex: 1;
    }

    .remove-time-btn {
      background: #ff4757;
      padding: 12px;
      font-size: 16px;
    }

    .remove-time-btn:hover {
      background: #ff3838;
    }

    .add-time-btn {
      background: #4a90e2;
      padding: 8px 16px;
      font-size: 14px;
      margin-top: 10px;
    }

    .add-time-btn:hover {
      background: #357abd;
    }

    .reminder-days {
      font-size: 12px;
      color: #888;
      margin-top: 5px;
    }

    .edit-btn {
      background: #4a90e2;
      padding: 8px 16px;
      font-size: 14px;
      margin-right: 8px;
    }

    .edit-btn:hover {
      background: #357abd;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 20px;
      max-width: 500px;
      width: 90%;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .modal-buttons button {
      flex: 1;
    }

    .cancel-btn {
      background: #999;
    }

    .cancel-btn:hover {
      background: #888;
    }

    .reminder-item.soon {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      50% {
        box-shadow: 0 2px 16px rgba(74, 144, 226, 0.6);
      }
    }

    @media (max-width: 600px) {
      .reminder-item {
        flex-wrap: nowrap;
      }

      .reminder-item>div:last-child {
        display: flex;
        gap: 5px;
        flex-shrink: 0;
      }

      .edit-btn,
      .delete-btn {
        padding: 6px 10px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
      <h1 style="margin: 0;">🔔 Нагадування</h1>
      <div style="display: flex; gap: 10px;">
        <button onclick="window.location.href='/logout'"
          style="font-size: 14px; padding: 8px 16px; border-radius: 8px; background: #999;">Вийти</button>
        <button id="addToggleBtn" onclick="toggleAddForm()"
          style="font-size: 24px; padding: 8px 16px; width: 50px; height: 50px; border-radius: 50%;">+</button>
      </div>
    </div>

    <div class="form" id="addForm" style="display: none;">
      <div class="form-group">
        <label>Час:</label>
        <div class="times-container" id="timesContainer">
          <div class="time-input-group">
            <input type="time" class="time-input" required>
            <button type="button" class="remove-time-btn" onclick="removeTimeInput(this)"
              style="display: none;">×</button>
          </div>
        </div>
        <button type="button" class="add-time-btn" onclick="addTimeInput()">+ Додати час</button>
      </div>
      <div class="form-group">
        <label>Повідомлення:</label>
        <input type="text" id="message" placeholder="🏋️ Час зарядки! Встань і розімнися 💪">
      </div>
      <div class="form-group">
        <label>Дні тижня:</label>
        <div class="days-selector">
          <label><input type="checkbox" value="1" checked> Пн</label>
          <label><input type="checkbox" value="2" checked> Вт</label>
          <label><input type="checkbox" value="3" checked> Ср</label>
          <label><input type="checkbox" value="4" checked> Чт</label>
          <label><input type="checkbox" value="5" checked> Пт</label>
          <label><input type="checkbox" value="6"> Сб</label>
          <label><input type="checkbox" value="7"> Нд</label>
        </div>
      </div>
      <div class="form-group">
        <label>Інтервал повторення (0 = щотижня):</label>
        <div class="interval-group">
          <input type="number" id="intervalValue" min="0" value="1" placeholder="1">
          <select id="intervalType">
            <option value="week">тижнів</option>
            <option value="month">місяців</option>
            <option value="year">років</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Початок дії:</label>
        <input type="date" id="startDate">
      </div>
      <div class="form-group">
        <label>Кінець дії (пусто = безкінечно):</label>
        <input type="date" id="endDate">
      </div>
      <button onclick="addReminder()">Додати нагадування</button>
      <button onclick="closeAddForm()" style="background: #999; margin-left: 10px;">Скасувати</button>
    </div>

    <div class="reminders" id="reminders">
      <div class="empty">Немає нагадувань</div>
    </div>
  </div>

  <div class="modal" id="editModal">
    <div class="modal-content">
      <h2>Редагувати нагадування</h2>
      <div class="form">
        <div class="form-group">
          <label>Час:</label>
          <div class="times-container" id="editTimesContainer">
            <div class="time-input-group">
              <input type="time" class="edit-time-input" required>
              <button type="button" class="remove-time-btn" onclick="removeEditTimeInput(this)"
                style="display: none;">×</button>
            </div>
          </div>
          <button type="button" class="add-time-btn" onclick="addEditTimeInput()">+ Додати час</button>
        </div>
        <div class="form-group">
          <label>Повідомлення:</label>
          <input type="text" id="editMessage" placeholder="🏋️ Час зарядки! Встань і розімнися 💪">
        </div>
        <div class="form-group">
          <label>Дні тижня:</label>
          <div class="days-selector" id="editDaysSelector">
            <label><input type="checkbox" value="1"> Пн</label>
            <label><input type="checkbox" value="2"> Вт</label>
            <label><input type="checkbox" value="3"> Ср</label>
            <label><input type="checkbox" value="4"> Чт</label>
            <label><input type="checkbox" value="5"> Пт</label>
            <label><input type="checkbox" value="6"> Сб</label>
            <label><input type="checkbox" value="7"> Нд</label>
          </div>
        </div>
        <div class="form-group">
          <label>Інтервал повторення (0 = щотижня):</label>
          <div class="interval-group">
            <input type="number" id="editIntervalValue" min="0" value="1" placeholder="1">
            <select id="editIntervalType">
              <option value="week">тижнів</option>
              <option value="month">місяців</option>
              <option value="year">років</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Початок дії:</label>
          <input type="date" id="editStartDate">
        </div>
        <div class="form-group">
          <label>Кінець дії (пусто = безкінечно):</label>
          <input type="date" id="editEndDate">
        </div>
        <div class="modal-buttons">
          <button class="cancel-btn" onclick="closeEditModal()">Скасувати</button>
          <button onclick="saveEdit()">Зберегти</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Ініціалізація поля startDate з сьогоднішньою датою
    document.addEventListener('DOMContentLoaded', () => {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('startDate').value = today;
    });

    function toggleAddForm() {
      const form = document.getElementById('addForm');
      const btn = document.getElementById('addToggleBtn');
      if (form.style.display === 'block') {
        form.style.display = 'none';
        btn.textContent = '+';
      } else {
        form.style.display = 'block';
        btn.textContent = '-';
      }
    }

    function openAddModal() {
      document.getElementById('addForm').style.display = 'block';
    }

    function closeAddForm() {
      document.getElementById('addForm').style.display = 'none';
      document.getElementById('addToggleBtn').textContent = '+';
    }

    function addTimeInput() {
      const container = document.getElementById('timesContainer');
      const newGroup = document.createElement('div');
      newGroup.className = 'time-input-group';
      newGroup.innerHTML = `
        <input type="time" class="time-input" required>
        <button type="button" class="remove-time-btn" onclick="removeTimeInput(this)">×</button>
      `;
      container.appendChild(newGroup);
      updateRemoveButtons();
    }

    function removeTimeInput(button) {
      const container = document.getElementById('timesContainer');
      if (container.children.length > 1) {
        button.parentElement.remove();
        updateRemoveButtons();
      }
    }

    function updateRemoveButtons() {
      const container = document.getElementById('timesContainer');
      const buttons = container.querySelectorAll('.remove-time-btn');
      buttons.forEach((btn, index) => {
        btn.style.display = container.children.length > 1 ? 'block' : 'none';
      });
    }

    function addEditTimeInput() {
      const container = document.getElementById('editTimesContainer');
      const newGroup = document.createElement('div');
      newGroup.className = 'time-input-group';
      newGroup.innerHTML = `
        <input type="time" class="edit-time-input" required>
        <button type="button" class="remove-time-btn" onclick="removeEditTimeInput(this)">×</button>
      `;
      container.appendChild(newGroup);
      updateEditRemoveButtons();
    }

    function removeEditTimeInput(button) {
      const container = document.getElementById('editTimesContainer');
      if (container.children.length > 1) {
        button.parentElement.remove();
        updateEditRemoveButtons();
      }
    }

    function updateEditRemoveButtons() {
      const container = document.getElementById('editTimesContainer');
      const buttons = container.querySelectorAll('.remove-time-btn');
      buttons.forEach((btn, index) => {
        btn.style.display = container.children.length > 1 ? 'block' : 'none';
      });
    }

    async function loadReminders() {
      const response = await fetch('/api/reminders');
      const reminders = await response.json();

      const container = document.getElementById('reminders');
      if (reminders.length === 0) {
        container.innerHTML = '<div class="empty">Немає нагадувань</div>';
        return;
      }

      const dayNames = ['', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Нд'];

      // Отримати поточний час в Europe/Kyiv
      const now = new Date();
      const kievTime = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Kyiv' }));
      const currentHour = kievTime.getHours();
      const currentMinute = kievTime.getMinutes();
      const currentTotalMinutes = currentHour * 60 + currentMinute;
      const currentDay = kievTime.getDay() || 7; // 1=Пн, 7=Нд

      // Сортування за актуальністю
      const sortedReminders = [...reminders].sort((a, b) => {
        const timesA = a.times || (a.time ? [a.time] : ['10:00']);
        const timesB = b.times || (b.time ? [b.time] : ['10:00']);
        const [hoursA, minutesA] = timesA[0].split(':').map(Number);
        const [hoursB, minutesB] = timesB[0].split(':').map(Number);
        const reminderTotalMinutesA = hoursA * 60 + minutesA;
        const reminderTotalMinutesB = hoursB * 60 + minutesB;

        // Перевірити чи нагадування на сьогодні
        const isTodayA = a.days.includes(currentDay);
        const isTodayB = b.days.includes(currentDay);

        if (isTodayA && !isTodayB) return -1;
        if (!isTodayA && isTodayB) return 1;

        if (isTodayA && isTodayB) {
          // Обидва сьогодні - сортувати за часом (найближче перше)
          const diffA = reminderTotalMinutesA - currentTotalMinutes;
          const diffB = reminderTotalMinutesB - currentTotalMinutes;

          // Якщо час вже минув, вважати як завтра
          const adjustedDiffA = diffA >= 0 ? diffA : diffA + 24 * 60;
          const adjustedDiffB = diffB >= 0 ? diffB : diffB + 24 * 60;

          return adjustedDiffA - adjustedDiffB;
        }

        // Обидва не сьогодні - сортувати за часом
        return timesA[0].localeCompare(timesB[0]);
      });

      container.innerHTML = sortedReminders.map(r => {
        const times = r.times || (r.time ? [r.time] : ['10:00']);
        const isSoon = times.some(time => {
          const [hours, minutes] = time.split(':').map(Number);
          const reminderTotalMinutes = hours * 60 + minutes;
          const diff = reminderTotalMinutes - currentTotalMinutes;
          return diff >= 0 && diff <= 60;
        });

        return `
          <div class="reminder-item ${isSoon ? 'soon' : ''}">
            <div>
              <span class="reminder-time">${times.join(', ')}</span>
              <span class="reminder-message">${r.message || 'Зарядка!'}</span>
              <div class="reminder-days">${(r.days || [1, 2, 3, 4, 5]).map(d => dayNames[d]).join(', ')}</div>
            </div>
            <div>
              <button class="edit-btn" onclick="openEditModal('${r.id}')">Редагувати</button>
              <button class="delete-btn" onclick="deleteReminder('${r.id}')">Видалити</button>
            </div>
          </div>
        `;
      }).join('');
    }

    async function addReminder() {
      const timeInputs = document.querySelectorAll('.time-input');
      const times = Array.from(timeInputs).map(input => input.value).filter(t => t);
      const message = document.getElementById('message').value;
      const checkboxes = document.querySelectorAll('.days-selector input:checked');
      const days = Array.from(checkboxes).map(cb => parseInt(cb.value));
      const intervalValue = parseInt(document.getElementById('intervalValue').value) || 0;
      const intervalType = document.getElementById('intervalType').value;
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value || null;

      if (times.length === 0) {
        alert('Вкажіть хоча б один час');
        return;
      }

      if (days.length === 0) {
        alert('Оберіть хоча б один день');
        return;
      }

      await fetch('/api/reminders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ times, message, days, interval_value: intervalValue, interval_type: intervalType, start_date: startDate, end_date: endDate })
      });

      // Очищуємо тільки час і повідомлення, залишаємо дні та інтервал
      timeInputs.forEach(input => input.value = '');
      document.getElementById('message').value = '';
      loadReminders();
    }

    async function deleteReminder(id) {
      await fetch(`/api/reminders/${id}`, { method: 'DELETE' });
      loadReminders();
    }

    let editingId = null;

    async function openEditModal(id) {
      const response = await fetch('/api/reminders');
      const reminders = await response.json();
      const reminder = reminders.find(r => r.id === id);

      if (!reminder) return;

      editingId = id;
      document.getElementById('editMessage').value = reminder.message || '';
      document.getElementById('editIntervalValue').value = reminder.interval_value || 0;
      document.getElementById('editIntervalType').value = reminder.interval_type || 'week';
      document.getElementById('editStartDate').value = reminder.start_date || new Date().toISOString().split('T')[0];
      document.getElementById('editEndDate').value = reminder.end_date || '';

      // Load times
      const times = reminder.times || (reminder.time ? [reminder.time] : ['10:00']);
      const editTimesContainer = document.getElementById('editTimesContainer');
      editTimesContainer.innerHTML = '';
      times.forEach((time, index) => {
        const newGroup = document.createElement('div');
        newGroup.className = 'time-input-group';
        newGroup.innerHTML = `
          <input type="time" class="edit-time-input" value="${time}" required>
          <button type="button" class="remove-time-btn" onclick="removeEditTimeInput(this)" style="display: ${times.length > 1 ? 'block' : 'none'};">×</button>
        `;
        editTimesContainer.appendChild(newGroup);
      });

      const checkboxes = document.querySelectorAll('#editDaysSelector input');
      checkboxes.forEach(cb => {
        cb.checked = (reminder.days || [1, 2, 3, 4, 5]).includes(parseInt(cb.value));
      });

      document.getElementById('editModal').classList.add('active');
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.remove('active');
      editingId = null;
    }

    async function saveEdit() {
      const editTimeInputs = document.querySelectorAll('.edit-time-input');
      const times = Array.from(editTimeInputs).map(input => input.value).filter(t => t);
      const message = document.getElementById('editMessage').value;
      const checkboxes = document.querySelectorAll('#editDaysSelector input:checked');
      const days = Array.from(checkboxes).map(cb => parseInt(cb.value));
      const intervalValue = parseInt(document.getElementById('editIntervalValue').value) || 0;
      const intervalType = document.getElementById('editIntervalType').value;
      const startDate = document.getElementById('editStartDate').value;
      const endDate = document.getElementById('editEndDate').value || null;

      if (times.length === 0) {
        alert('Вкажіть хоча б один час');
        return;
      }

      if (days.length === 0) {
        alert('Оберіть хоча б один день');
        return;
      }

      await fetch(`/api/reminders/${editingId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ times, message, days, interval_value: intervalValue, interval_type: intervalType, start_date: startDate, end_date: endDate })
      });

      closeEditModal();
      loadReminders();
    }

    loadReminde();
  </script>
</body>

</html>
