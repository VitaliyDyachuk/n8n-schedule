<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Нагадування</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      color: #333;
      margin-bottom: 30px;
      text-align: center;
    }

    .form {
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: #555;
      font-weight: 500;
    }

    input[type="time"],
    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .reminders {
      margin-top: 30px;
    }

    .reminder-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .reminder-time {
      font-weight: 600;
      color: #333;
    }

    .reminder-message {
      color: #666;
      margin-left: 10px;
    }

    .delete-btn {
      background: #ff4757;
      padding: 8px 16px;
      font-size: 14px;
    }

    .delete-btn:hover {
      background: #ff3838;
    }

    .empty {
      text-align: center;
      color: #999;
      padding: 30px;
    }

    .days-selector {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .days-selector label {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      font-weight: normal;
    }

    .days-selector input[type="checkbox"] {
      width: auto;
    }

    .reminder-days {
      font-size: 12px;
      color: #888;
      margin-top: 5px;
    }

    .edit-btn {
      background: #4a90e2;
      padding: 8px 16px;
      font-size: 14px;
      margin-right: 8px;
    }

    .edit-btn:hover {
      background: #357abd;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 20px;
      max-width: 500px;
      width: 90%;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .modal-buttons button {
      flex: 1;
    }

    .cancel-btn {
      background: #999;
    }

    .cancel-btn:hover {
      background: #888;
    }

    .reminder-item.soon {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      50% {
        box-shadow: 0 2px 16px rgba(255, 193, 7, 0.6);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🔔 Нагадування</h1>

    <div class="form">
      <div class="form-group">
        <label>Час:</label>
        <input type="time" id="time" required>
      </div>
      <div class="form-group">
        <label>Повідомлення:</label>
        <input type="text" id="message" placeholder="🏋️ Час зарядки! Встань і розімнися 💪">
      </div>
      <div class="form-group">
        <label>Дні тижня:</label>
        <div class="days-selector">
          <label><input type="checkbox" value="1" checked> Пн</label>
          <label><input type="checkbox" value="2" checked> Вт</label>
          <label><input type="checkbox" value="3" checked> Ср</label>
          <label><input type="checkbox" value="4" checked> Чт</label>
          <label><input type="checkbox" value="5" checked> Пт</label>
          <label><input type="checkbox" value="6"> Сб</label>
          <label><input type="checkbox" value="7"> Нд</label>
        </div>
      </div>
      <button onclick="addReminder()">Додати нагадування</button>
    </div>

    <div class="reminders" id="reminders">
      <div class="empty">Немає нагадувань</div>
    </div>
  </div>

  <div class="modal" id="editModal">
    <div class="modal-content">
      <h2>Редагувати нагадування</h2>
      <div class="form">
        <div class="form-group">
          <label>Час:</label>
          <input type="time" id="editTime" required>
        </div>
        <div class="form-group">
          <label>Повідомлення:</label>
          <input type="text" id="editMessage" placeholder="🏋️ Час зарядки! Встань і розімнися 💪">
        </div>
        <div class="form-group">
          <label>Дні тижня:</label>
          <div class="days-selector" id="editDaysSelector">
            <label><input type="checkbox" value="1"> Пн</label>
            <label><input type="checkbox" value="2"> Вт</label>
            <label><input type="checkbox" value="3"> Ср</label>
            <label><input type="checkbox" value="4"> Чт</label>
            <label><input type="checkbox" value="5"> Пт</label>
            <label><input type="checkbox" value="6"> Сб</label>
            <label><input type="checkbox" value="7"> Нд</label>
          </div>
        </div>
        <div class="modal-buttons">
          <button class="cancel-btn" onclick="closeEditModal()">Скасувати</button>
          <button onclick="saveEdit()">Зберегти</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    async function loadReminders() {
      const response = await fetch('/api/reminders');
      const reminders = await response.json();

      const container = document.getElementById('reminders');
      if (reminders.length === 0) {
        container.innerHTML = '<div class="empty">Немає нагадувань</div>';
        return;
      }

      const dayNames = ['', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Нд'];

      // Сортування за часом
      const sortedReminders = [...reminders].sort((a, b) => a.time.localeCompare(b.time));

      // Перевірити чи нагадування протягом години (Europe/Kyiv)
      const now = new Date();
      const kievTime = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Kyiv' }));
      const currentHour = kievTime.getHours();
      const currentMinute = kievTime.getMinutes();
      const currentTotalMinutes = currentHour * 60 + currentMinute;

      container.innerHTML = sortedReminders.map(r => {
        const [hours, minutes] = r.time.split(':').map(Number);
        const reminderTotalMinutes = hours * 60 + minutes;
        const diff = reminderTotalMinutes - currentTotalMinutes;
        const isSoon = diff >= 0 && diff <= 60;

        return `
          <div class="reminder-item ${isSoon ? 'soon' : ''}">
            <div>
              <span class="reminder-time">${r.time}</span>
              <span class="reminder-message">${r.message || 'Зарядка!'}</span>
              <div class="reminder-days">${(r.days || [1, 2, 3, 4, 5]).map(d => dayNames[d]).join(', ')}</div>
            </div>
            <div>
              <button class="edit-btn" onclick="openEditModal('${r.id}')">Редагувати</button>
              <button class="delete-btn" onclick="deleteReminder('${r.id}')">Видалити</button>
            </div>
          </div>
        `;
      }).join('');
    }

    async function addReminder() {
      const time = document.getElementById('time').value;
      const message = document.getElementById('message').value;
      const checkboxes = document.querySelectorAll('.days-selector input:checked');
      const days = Array.from(checkboxes).map(cb => parseInt(cb.value));

      if (!time) {
        alert('Вкажіть час');
        return;
      }

      if (days.length === 0) {
        alert('Оберіть хоча б один день');
        return;
      }

      await fetch('/api/reminders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ time, message, days })
      });

      document.getElementById('time').value = '';
      document.getElementById('message').value = '';
      loadReminders();
    }

    async function deleteReminder(id) {
      await fetch(`/api/reminders/${id}`, { method: 'DELETE' });
      loadReminders();
    }

    let editingId = null;

    async function openEditModal(id) {
      const response = await fetch('/api/reminders');
      const reminders = await response.json();
      const reminder = reminders.find(r => r.id === id);

      if (!reminder) return;

      editingId = id;
      document.getElementById('editTime').value = reminder.time;
      document.getElementById('editMessage').value = reminder.message || '';

      const checkboxes = document.querySelectorAll('#editDaysSelector input');
      checkboxes.forEach(cb => {
        cb.checked = (reminder.days || [1, 2, 3, 4, 5]).includes(parseInt(cb.value));
      });

      document.getElementById('editModal').classList.add('active');
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.remove('active');
      editingId = null;
    }

    async function saveEdit() {
      const time = document.getElementById('editTime').value;
      const message = document.getElementById('editMessage').value;
      const checkboxes = document.querySelectorAll('#editDaysSelector input:checked');
      const days = Array.from(checkboxes).map(cb => parseInt(cb.value));

      if (!time) {
        alert('Вкажіть час');
        return;
      }

      if (days.length === 0) {
        alert('Оберіть хоча б один день');
        return;
      }

      await fetch(`/api/reminders/${editingId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ time, message, days })
      });

      closeEditModal();
      loadReminders();
    }

    loadReminders();
  </script>
</body>

</html>
